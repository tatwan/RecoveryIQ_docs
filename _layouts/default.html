<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>

    <!-- GitHub-style markdown CSS (from unpkg/cdn). You can pin a version if you like. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">

    <!-- Small page layout helper so content isn't full-width -->
    <style>
      .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: 980px;
        margin: 0 auto;
        padding: 45px;
      }
      /* Optional: style images to fit container */
      .markdown-body img { max-width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <header>
      <!-- optional header / navigation -->
    </header>

    <!-- Wrap the Jekyll content in the markdown-body class so it looks like GitHub's repo view -->
    <main class="markdown-body">
      {{ content }}
    </main>

    <footer>
      <!-- optional footer -->
    </footer>
  </body>
</html>
