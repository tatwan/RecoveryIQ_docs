<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title | default: "RecoveryIQ" }}</title>

    <!-- GitHub-style markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
      }
      .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: 980px;
        margin: 0 auto;
        padding: 45px;
      }
      .markdown-body img { 
        max-width: 100%; 
        height: auto; 
      }
      /* Ensure proper spacing for headers */
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        margin-top: 24px;
        margin-bottom: 16px;
      }
      .markdown-body h1 {
        padding-bottom: 0.3em;
        border-bottom: 1px solid #d0d7de;
      }
      /* Better list styling */
      .markdown-body ul,
      .markdown-body ol {
        padding-left: 2em;
      }
      /* Center-aligned content support */
      .markdown-body p[align="center"] {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="markdown-body">
      {{ content }}
    </main>
  </body>
</html>
